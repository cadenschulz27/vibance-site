<header class="sticky top-0 z-40 bg-neutral-950/80 backdrop-blur border-b border-neutral-900">
  <div class="mx-auto max-w-6xl px-4 h-16 flex items-center justify-between">
    <!-- Brand -->
    <a href="/" class="flex items-center gap-2">

      <span class="font-semibold tracking-wide">Vibance</span>
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-6" data-header="desktop-nav">
      <a href="/dashboard/dashboard.html" class="text-neutral-300 hover:text-white">Dashboard</a>
      <a href="/Accounts/accounts.html" class="text-neutral-300 hover:text-white">Accounts</a>
      <a href="/Expenses/expenses.html" class="text-neutral-300 hover:text-white">Expenses</a>

          <svg class="h-4 w-4 text-neutral-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd"/>

        </button>
        <div class="absolute right-0 mt-2 w-48 rounded-xl border border-neutral-800 bg-neutral-950 shadow-lg p-1 hidden">

          <a href="/Social/social.html" class="block px-3 py-2 rounded-lg text-neutral-200 hover:bg-neutral-900">Community</a>
          <hr class="my-1 border-neutral-800">
          <button data-header="logout" class="w-full text-left px-3 py-2 rounded-lg text-red-400 hover:bg-red-500/10">Log out</button>
        </div>
      </div>

      <!-- Mobile toggle -->
      <button class="md:hidden p-2 rounded-lg hover:bg-neutral-900" data-header="mobile-toggle" aria-expanded="false" aria-label="Toggle menu">
        <svg class="h-6 w-6 text-neutral-200" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  <nav class="md:hidden hidden border-t border-neutral-900" data-header="mobile-nav">
