<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expenses • Vibance</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts (optional, match rest of site if used) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { color-scheme: dark; }
    html, body { background: #0a0a0a; color: #e5e7eb; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif; }
    .container { max-width: 1100px; }
    /* thin scrollbars */
    * { scrollbar-width: thin; scrollbar-color: #3f3f46 #18181b; }
    *::-webkit-scrollbar { height: 8px; width: 8px; }
    *::-webkit-scrollbar-track { background: #18181b; }
    *::-webkit-scrollbar-thumb { background-color: #3f3f46; border-radius: 8px; }
  </style>
</head>
<body class="bg-neutral-950 text-neutral-100">
  <!-- Header mount -->
  <div id="site-header"></div>

  <main class="container mx-auto px-4 py-6 md:py-10">
    <header class="mb-6 md:mb-8">
      <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">Expenses</h1>
      <p class="text-neutral-400 mt-1">View, search, and categorize your recent transactions.</p>
    </header>

    <!-- Toolbar -->
    <section class="bg-neutral-950/60 border border-neutral-900 rounded-2xl p-4 md:p-5 mb-5">
      <div class="flex flex-wrap items-center gap-2 md:gap-3">
        <button id="sync-all-expenses" class="px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm">
          Sync all
        </button>

        <div class="h-6 w-px bg-neutral-800 hidden md:block"></div>

        <select id="account-filter" class="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm">
          <option>Loading accounts…</option>
        </select>

        <input id="start-date" type="date" class="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm" />
        <input id="end-date" type="date" class="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm" />

        <div class="relative flex-1 min-w-[200px]">
          <input id="search-input" type="text" placeholder="Search name, merchant, category…"
                 class="w-full px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm pr-8" />
          <svg class="absolute right-2 top-1/2 -translate-y-1/2 h-4 w-4 text-neutral-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path>
          </svg>
        </div>

        <input id="min-amount" type="number" step="0.01" placeholder="Min"
               class="w-32 px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm" />
        <input id="max-amount" type="number" step="0.01" placeholder="Max"
               class="w-32 px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm" />
        <input id="category-filter" type="text" placeholder="Category…" list="category-list"
               class="w-44 px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-sm" />

        <div class="h-6 w-px bg-neutral-800 hidden md:block"></div>

        <button id="reset-filters" class="px-3 py-2 rounded-lg bg-neutral-800 hover:bg-neutral-700 text-white text-sm">
          Reset
        </button>
        <button id="export-csv" class="px-3 py-2 rounded-lg bg-neutral-800 hover:bg-neutral-700 text-white text-sm">
          Export CSV
        </button>
      </div>

      <!-- Totals -->
      <div class="mt-4 text-sm text-neutral-300 flex flex-wrap items-center gap-4">
        <span>Rows: <strong id="tx-count" class="text-neutral-100">0</strong></span>
        <span>Income: <strong id="totals-income" class="text-emerald-400">—</strong></span>
        <span>Expenses: <strong id="totals-expense" class="text-red-400">—</strong></span>
        <span>Net: <strong id="totals-net" class="text-neutral-100">—</strong></span>
      </div>
    </section>

    <!-- Empty state -->
    <div id="tx-empty" class="hidden rounded-2xl border border-neutral-900 bg-neutral-950/60 p-8 text-center text-neutral-400">
      No transactions found. Try syncing your accounts or adjusting filters.
    </div>

    <!-- Table -->
    <section class="rounded-2xl border border-neutral-900 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-neutral-950/80 border-b border-neutral-900 text-neutral-400">
            <tr>
              <th class="px-4 py-3 text-left font-medium">Account</th>
              <th class="px-4 py-3 text-left font-medium">Date</th>
              <th class="px-4 py-3 text-left font-medium">Name</th>
              <th class="px-4 py-3 text-right font-medium">Amount</th>
              <th class="px-4 py-3 text-left font-medium">Merchant</th>
              <th class="px-4 py-3 text-left font-medium">Category</th>
            </tr>
          </thead>
          <tbody id="tx-table-body" class="divide-y divide-neutral-900 bg-neutral-950/40">
            <!-- rows injected by expenses.js -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Pagination -->
    <section class="mt-4 flex items-center justify-between">
      <button id="pagination-prev" class="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-white disabled:opacity-50">
        Prev
      </button>
      <span id="pagination-label" class="text-neutral-400 text-sm">0 of 0</span>
      <button id="pagination-next" class="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-white disabled:opacity-50">
        Next
      </button>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2
    rounded-lg bg-neutral-900 border border-neutral-800 text-white px-4 py-2
    opacity-0 pointer-events-none transition-opacity"></div>

  <!-- Optional datalist for quick category entry suggestions -->
  <datalist id="category-list">
    <option value="Groceries"></option>
    <option value="Dining"></option>
    <option value="Shopping"></option>
    <option value="Rent/Mortgage"></option>
    <option value="Utilities"></option>
    <option value="Insurance"></option>
    <option value="Transport"></option>
    <option value="Travel"></option>
    <option value="Health"></option>
    <option value="Subscriptions"></option>
    <option value="Entertainment"></option>
    <option value="Education"></option>
    <option value="Gifts"></option>
    <option value="Fees"></option>
    <option value="Taxes"></option>
    <option value="Transfer"></option>
    <option value="Salary"></option>
    <option value="Refund"></option>
    <option value="Investment"></option>
    <option value="Interest"></option>
    <option value="Other"></option>
  </datalist>

  <!-- Scripts -->
  <script type="module" src="/api/firebase.js"></script>
  <script type="module" src="/auth/auth-check.js"></script>
  <script type="module" src="/components/header.js"></script>
  <script type="module" src="/Expenses/expenses.js"></script>
</body>
</html>
