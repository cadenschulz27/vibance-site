<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Vibance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="social.css">
</head>
<body class="bg-black text-white font-['Inter']">

    <div id="header-placeholder"></div>

    <main class="social-container">
        <!-- Story section (placeholder) -->
        <div class="stories-container">
            <div class="story-placeholder"></div>
            <div class="story-placeholder"></div>
            <div class="story-placeholder"></div>
            <div class="story-placeholder"></div>
        </div>

        <!-- Main Feed -->
        <div id="feed-container" class="feed-container">
            <!-- Posts will be loaded here by social.js -->
        </div>
    </main>

    <!-- Create Post Modal -->
    <div id="create-post-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create a New Post</h2>
                <button id="close-modal-btn">&times;</button>
            </div>
            <form id="post-form">
                <textarea id="post-description" placeholder="What's on your mind?"></textarea>
                <div id="image-drop-zone">
                    <p>Drag & drop an image here, or click to select</p>
                    <input type="file" id="image-input" class="hidden" accept="image/*">
                </div>
                <div id="image-preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Image preview">
                    <button type="button" id="remove-image-btn" class="remove-image-btn">&times;</button>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-post">Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Image Lightbox Modal -->
    <div id="image-lightbox" class="lightbox-modal hidden">
        <span id="close-lightbox-btn" class="lightbox-close-btn">&times;</span>
        <img id="lightbox-image" class="lightbox-content" src="">
    </div>

    <!-- Scripts -->
    <script type="module" src="../api/firebase.js"></script>
    <script type="module" src="../auth/auth-check.js"></script>
    <script type="module" src="../components/header.js"></script>
    <!-- We will update the script references in a later step -->
    <script type="module" src="social.js"></script>
</body>
</html>
