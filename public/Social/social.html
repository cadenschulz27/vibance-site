<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Vibance</title>
    
    <link rel="stylesheet" href="social.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-['Inter']">

    <div id="header-placeholder"></div>

    <main class="social-container">
        
        <div id="create-post-bar" class="create-post-bar">
            <div class="avatar-container">
                <!-- Current user avatar is loaded here by social.js -->
            </div>
            <div class="create-post-input-placeholder">What's on your financial mind?</div>
            <div class="create-post-action-icon">
                <!-- Photo Icon -->
                <svg class="w-6 h-6 text-secondary-text-color" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
        </div>

        <!-- NEW: Feed Type Tabs -->
        <div class="feed-tabs">
            <button class="feed-tab active" data-feed-type="for-you">For You</button>
            <button class="feed-tab" data-feed-type="following">Following</button>
        </div>

        <div id="feed-container">
            <!-- Posts will be loaded here by social.js -->
        </div>

        <button id="load-more-btn" class="hidden">Load More</button>
        
    </main>
    
    <div id="modal-root"></div>

    <script type="module" src="../api/firebase.js"></script>
    <script type="module" src="../auth/auth-check.js"></script>
    <script type="module" src="../components/header.js"></script>
    <script type="module" src="social.js"></script>
</body>
</html>
