<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Vibance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #f5f5f5; font-family: 'Inter', sans-serif; }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            border-bottom: 1px solid #262626;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-name { font-size: 1.75rem; font-weight: 300; }
        .profile-stats { display: flex; gap: 2.5rem; margin-top: 1rem; }
        .stat-number { font-weight: 600; }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .post-thumbnail {
            position: relative;
            padding-bottom: 100%; /* 1:1 Aspect Ratio */
        }
        .post-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="max-w-4xl mx-auto">
        <div id="profile-container">
            <p class="text-center p-20 text-gray-500">Loading profile...</p>
        </div>

        <div id="user-posts-grid" class="posts-grid">
            <!-- User's posts will be loaded here -->
        </div>
    </main>
    
    <!-- Scripts -->
    <script type="module" src="../api/firebase.js"></script>
    <script type="module" src="../auth/auth-check.js"></script>
    <script type="module" src="../components/header.js"></script>
    <!-- We will create user-profile.js in a later step -->
</body>
</html>
